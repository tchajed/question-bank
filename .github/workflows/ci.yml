name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: "gofmt"
        run: go fmt ./... && git diff --exit-code
      - name: "go test"
        run: go test ./...

  latex:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Fix apt cache permissions
        run: sudo chmod -R a+rwX /var/cache/apt/archives
      - name: Cache apt packages
        uses: actions/cache@v5
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-texlive-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: apt-${{ runner.os }}-texlive-
      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-pictures \
            texlive-science \
            latexmk
          sudo chmod -R a+rX /var/cache/apt/archives
      - name: Build
        run: go build -o question-bank .
      - name: Render exam
        run: ./question-bank render --bank testdata/bank -o /tmp/exam.pdf testdata/exams/exam.toml
      - name: Render student sheets
        run: ./question-bank scantron sheets testdata/scantron/grades.csv --exam testdata/exams/grading-exam.toml --bank testdata/bank -o /tmp/sheets
