name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: "go test"
        run: go test ./...

  latex:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Cache apt packages
        uses: actions/cache@v5
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-texlive-full-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: apt-${{ runner.os }}-texlive-full-
      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-full latexmk
      - name: Build
        run: go build -o question-bank .
      - name: Render exam
        run: ./question-bank render --bank testdata/bank -o /tmp/exam.pdf testdata/exams/exam.toml
